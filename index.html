<!DOCTYPE html>
<html>
<head>
<title>Valentine</title>

<style>
body{
background:#ffd6e7;
font-family:Arial, sans-serif;
text-align:center;
padding-top:100px;
}

h1{
color:#d1005c;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#e0e0e0;
}

.heart{
position:fixed;
color:red;
font-size:24px;
animation: float 3s linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-800px)}
}
</style>

</head>

<body>

<h1 id="question">Palash, will you be my Valentine? ❤️</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No</button>

<script>

let messages = [
"Are you sure? 🥺",
"Think again 😌",
"Really sure? ❤️",
"Last chance 😜",
"I'll be sad if you click no 💔"
];

let index = 0;
let yesSize = 18;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const question = document.getElementById("question");


noBtn.addEventListener("mouseover", function(){

const x = Math.random() * window.innerWidth * 0.8;
const y = Math.random() * window.innerHeight * 0.8;

noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});


noBtn.addEventListener("click", function(){

question.innerText = messages[index % messages.length];
index++;

yesSize += 8;
yesBtn.style.fontSize = yesSize + "px";
});


yesBtn.addEventListener("click", function(){

question.innerText="YAY!! I knew you'd say YES ❤️🥰";

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top="90vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},3000);
}

});

</script>

</body>
</html>
