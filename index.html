<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Palash ❤️</title>
<style>
body{font-family:Arial;text-align:center;margin-top:100px;background:#ffe6f2;}
button{font-size:20px;padding:10px 25px;margin:10px;border:none;border-radius:10px;cursor:pointer;}
#yes{background:#ff4d88;color:white;}
#no{background:#ddd;position:absolute;}
#message{font-size:26px;margin-top:40px;color:#ff0066;}
</style>
</head>
<body>

<h1>Palash, will you be my Valentine? ❤️</h1>
<button id="yes">Yes</button>
<button id="no">No</button>
<div id="message"></div>

<script>
const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const msg=document.getElementById("message");

noBtn.addEventListener("mouseover",()=>{
noBtn.style.left=Math.random()*80+"%";
noBtn.style.top=Math.random()*80+"%";
});

yesBtn.onclick=()=>{
msg.innerHTML="I love you so much Palash ❤️ You are my forever 💖";
};
</script>

</body>
</html>
